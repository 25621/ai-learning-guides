<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Reinforcement Learning: Beginner to Advanced">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#205d3b"/>
      <stop offset="100%" stop-color="#2e8555"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25c2a0"/>
      <stop offset="100%" stop-color="#33925d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#ffffff" stroke-width="2" fill="none">
    <circle cx="950" cy="120" r="60"/>
    <circle cx="1080" cy="260" r="40"/>
    <circle cx="900" cy="500" r="80"/>
    <path d="M950 120 L1080 260 L900 500 Z"/>
  </g>
  <rect x="80" y="80" width="120" height="6" rx="3" fill="url(#accent)"/>
  <text x="80" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#a8e0c0" letter-spacing="2">OPEN-SOURCE GUIDE</text>
  <text x="80" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Reinforcement</text>
  <text x="80" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Learning</text>
  <text x="80" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#a8e0c0">Beginner to Advanced — a 6-month roadmap</text>
  <g transform="translate(80, 500)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="600">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="90" y="29" text-anchor="middle">MDPs &amp; Bandits</text>
    <rect x="195" y="0" width="170" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="280" y="29" text-anchor="middle">Q-Learning</text>
    <rect x="380" y="0" width="150" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
    <text x="455" y="29" text-anchor="middle">DQN</text>
    <rect x="545" y="0" width="180" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
